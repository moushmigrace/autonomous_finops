apiVersion: v1
kind: ServiceAccount
metadata:
  name: finops-agent
  namespace: finops

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finops-agent-role

rules:

- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch"]

- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: finops-agent-binding

subjects:
- kind: ServiceAccount
  name: finops-agent
  namespace: finops

roleRef:
  kind: ClusterRole
  name: finops-agent-role
  apiGroup: rbac.authorization.k8s.io