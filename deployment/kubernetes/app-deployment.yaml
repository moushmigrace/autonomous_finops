apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-app
  namespace: finops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend-app

  template:
    metadata:
      labels:
        app: backend-app

    spec:
      containers:
        - name: backend-app

          image: ghcr.io/moushmigrace/autonomous_finops/backend-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"