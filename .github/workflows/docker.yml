name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:

  docker:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build & Push Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/agent.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/finops-agent:latest


      - name: Build & Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/app.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend-app:latest