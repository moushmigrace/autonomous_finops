name: CI/CD - Build & Deploy

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 Build & Push Agent
      - name: Build & Push Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/agent.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/finops-agent:latest

      # 🐳 Build & Push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/app.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend-app:latest

      # ☁ Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

     - name: Check AWS identity
       run: aws sts get-caller-identity  

      # 🔗 Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1\
            --name finops-cluster \
            --alias finops

          kubectl config use-context finops  
            
          kubectl get nodes  

      # 🚀 Deploy
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name finops-cluster

          kubectl get nodes

          kubectl create namespace finops --dry-run=client -o yaml | kubectl apply --validate=false -f -

          kubectl apply -f deployment/kubernetes/rbac.yaml
          kubectl apply -f deployment/kubernetes/secret.yaml

          kubectl apply -f deployment/kubernetes/agent-deployment.yaml
          kubectl apply -f deployment/kubernetes/app-deployment.yaml
          kubectl apply -f deployment/kubernetes/app-service.yaml

          kubectl rollout restart deployment finops-agent -n finops
          kubectl rollout restart deployment backend-app -n finops