name: CI/CD - Build & Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/agent.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/finops-agent:latest

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/app.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend-app:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name finops-cluster \
            --region us-east-1

      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment/kubernetes/
          kubectl rollout restart deployment finops-agent -n finops
          kubectl rollout restart deployment backend-app -n finops